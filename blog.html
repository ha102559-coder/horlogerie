<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Blog — HORLOGERIE</title>
<meta name="description" content="Stories, guides, and insights from the world of fine mechanical watchmaking.">
<meta name="robots" content="index, follow">
<link rel="stylesheet" href="css/style.css">
<style>
  .blog-hero {
    min-height:42vh; display:flex; align-items:center; justify-content:center;
    text-align:center; padding:130px 5% 70px; position:relative; overflow:hidden;
  }
  .blog-hero::before {
    content:''; position:absolute; inset:0;
    background:radial-gradient(ellipse 60% 60% at 50% 40%,rgba(201,169,110,0.06) 0%,transparent 70%);
  }
  .blog-hero-line {
    position:absolute; top:0; left:50%; width:1px; height:100%;
    background:linear-gradient(180deg,transparent,rgba(201,169,110,0.15),transparent);
    transform:translateX(-50%);
  }
  .blog-wrap { max-width:1200px; margin:0 auto; padding:0 5% 100px; }
  .blog-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(340px,1fr)); gap:28px; }
  .blog-card {
    background:var(--card); border:1px solid var(--border); overflow:hidden;
    transition:border-color .3s,transform .3s; cursor:pointer;
    display:flex; flex-direction:column;
  }
  .blog-card:hover { border-color:rgba(201,169,110,0.35); transform:translateY(-4px); }
  .blog-card-img { aspect-ratio:16/9; background:#111; overflow:hidden; position:relative; }
  .blog-card-img img { width:100%; height:100%; object-fit:cover; transition:transform .5s; }
  .blog-card:hover .blog-card-img img { transform:scale(1.05); }
  .blog-card-placeholder {
    width:100%; height:100%; display:flex; align-items:center; justify-content:center;
    background:linear-gradient(135deg,#1a1a1a,#0f0f0f);
  }
  .blog-card-placeholder svg { width:64px; height:64px; opacity:0.15; }
  .blog-tag {
    position:absolute; top:14px; left:14px;
    font-family:'Space Mono',monospace; font-size:9px; letter-spacing:2px; text-transform:uppercase;
    color:var(--gold); background:rgba(10,10,10,0.85); border:1px solid rgba(201,169,110,0.3); padding:4px 10px;
  }
  .blog-card-body { padding:22px; flex:1; display:flex; flex-direction:column; }
  .blog-meta {
    font-family:'Space Mono',monospace; font-size:10px; letter-spacing:2px; text-transform:uppercase;
    color:var(--muted); margin-bottom:10px; display:flex; gap:14px;
  }
  .blog-card-title {
    font-family:'Cormorant Garamond',serif; font-size:22px; font-weight:400;
    color:var(--white); line-height:1.3; margin-bottom:10px;
  }
  .blog-excerpt { font-size:13px; color:var(--muted); line-height:1.8; flex:1; margin-bottom:18px; }
  .blog-read-link {
    font-size:10px; letter-spacing:3px; text-transform:uppercase; color:var(--gold);
    display:inline-flex; align-items:center; gap:8px; transition:gap .2s;
  }
  .blog-card:hover .blog-read-link { gap:12px; }
  .section-divider { display:flex; align-items:center; gap:20px; margin-bottom:32px; }
  .section-divider::after { content:''; flex:1; height:1px; background:var(--border); }
  @media(max-width:768px){ .blog-grid{ grid-template-columns:1fr; } }
</style>
</head>
<body>

<nav id="nav">
  <a href="index.html" class="nav-logo">Hor<span>log</span>erie</a>
  <div class="nav-links">
    <a href="index.html#collection">Collection</a>
    <a href="blog.html" style="color:var(--gold);">Blog</a>
    <a href="admin/index.html"><button class="nav-admin-btn">Admin</button></a>
  </div>
</nav>

<div class="blog-hero">
  <div class="blog-hero-line"></div>
  <div style="position:relative;z-index:1;">
    <p class="section-label" style="margin-bottom:20px;">Horological Insights</p>
    <h1 class="serif" style="font-size:clamp(40px,6vw,72px);font-weight:300;color:var(--white);letter-spacing:2px;margin-bottom:16px;">
      The <em style="color:var(--gold);">Journal</em>
    </h1>
    <p style="color:var(--muted);font-size:14px;max-width:420px;margin:0 auto;line-height:1.9;">
      Stories, guides, and insights from the world of fine mechanical watchmaking.
    </p>
  </div>
</div>

<div class="blog-wrap">
  <div class="section-divider">
    <p class="section-label" style="margin:0;">All Articles</p>
  </div>
  <div id="blog-spinner" class="spinner"></div>
  <div id="blog-grid" class="blog-grid"></div>
  <p id="no-posts" style="color:var(--muted);text-align:center;padding:60px;letter-spacing:2px;display:none;">NO ARTICLES YET</p>
</div>

<footer id="footer">
  <div class="footer-logo">Horlogerie</div>
  <div class="footer-copy">© 2025 HORLOGERIE. All rights reserved.</div>
  <div class="footer-links">
    <a href="index.html#collection">Collection</a>
    <a href="blog.html">Blog</a>
  </div>
</footer>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getFirestore, collection, query, orderBy, getDocs }
  from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyB7SY3k0835AyM1fLDtOs0thPrg3cmxifk",
  authDomain: "gold-bed6c.firebaseapp.com",
  projectId: "gold-bed6c",
  storageBucket: "gold-bed6c.firebasestorage.app",
  messagingSenderId: "498200351921",
  appId: "1:498200351921:web:66e590427b3457a43afe90"
};
const app = initializeApp(firebaseConfig);
const db  = getFirestore(app);

async function loadPosts() {
  const grid    = document.getElementById('blog-grid');
  const spinner = document.getElementById('blog-spinner');
  try {
    const q    = query(collection(db,'blog_posts'), orderBy('createdAt','desc'));
    const snap = await getDocs(q);
    spinner.remove();
    if (snap.empty) { document.getElementById('no-posts').style.display='block'; return; }
    snap.forEach(d => {
      const p    = d.data();
      const date = p.createdAt?.toDate
        ? p.createdAt.toDate().toLocaleDateString('en-US',{month:'short',year:'numeric'})
        : '';
      const card = document.createElement('div');
      card.className = 'blog-card reveal';
      card.onclick = () => location.href = `blog-post.html?slug=${p.slug}`;
      card.innerHTML = `
        <div class="blog-card-img">
          ${p.coverImage
            ? `<img src="${p.coverImage}" alt="${p.title}" loading="lazy">`
            : `<div class="blog-card-placeholder">
                <svg viewBox="0 0 60 60" fill="none"><circle cx="30" cy="30" r="22" stroke="#c9a96e" stroke-width="0.8"/><line x1="30" y1="8" x2="30" y2="52" stroke="#c9a96e" stroke-width="0.4"/><line x1="8" y1="30" x2="52" y2="30" stroke="#c9a96e" stroke-width="0.4"/></svg>
               </div>`}
          ${p.tag ? `<div class="blog-tag">${p.tag}</div>` : ''}
        </div>
        <div class="blog-card-body">
          <div class="blog-meta">
            <span>${date}</span>
            ${p.readTime ? `<span>${p.readTime} min read</span>` : ''}
          </div>
          <div class="blog-card-title">${p.title}</div>
          <div class="blog-excerpt">${p.excerpt || ''}</div>
          <span class="blog-read-link">Read Article →</span>
        </div>`;
      grid.appendChild(card);
    });
    const io = new IntersectionObserver(es => es.forEach(e => {
      if(e.isIntersecting){ e.target.classList.add('visible'); io.unobserve(e.target); }
    }), {threshold:0.1});
    document.querySelectorAll('.reveal').forEach(el => io.observe(el));
  } catch(e) {
    spinner.remove();
    grid.innerHTML = `<p style="color:#e05555;grid-column:1/-1;text-align:center;">Failed to load: ${e.message}</p>`;
  }
}
loadPosts();
</script>
</body>
</html>
