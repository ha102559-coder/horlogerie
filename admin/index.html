<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin — HORLOGERIE</title>
<meta name="robots" content="noindex, nofollow">
<link rel="stylesheet" href="../css/style.css">
<style>
  body { background: #0a0a0a; }
  .admin-wrap { max-width: 1100px; margin: 0 auto; padding: 100px 5% 80px; }
  .admin-header { display:flex; align-items:center; justify-content:space-between; margin-bottom:48px; border-bottom:1px solid var(--border); padding-bottom:24px; }
  .watch-row { display:grid; grid-template-columns:80px 1fr auto auto; gap:20px; align-items:center; padding:18px 0; border-bottom:1px solid var(--border); }
  .watch-row-img { width:80px; height:60px; object-fit:cover; background:#111; }
  .watch-row-name { font-family:'Cormorant Garamond',serif; font-size:20px; color:var(--white); }
  .watch-row-price { font-family:'Space Mono',monospace; font-size:12px; color:var(--gold); }
  .row-actions { display:flex; gap:10px; }
  .btn-sm { padding:8px 16px; font-size:10px; letter-spacing:2px; text-transform:uppercase; border:1px solid var(--border); background:transparent; color:var(--muted); transition:all .2s; }
  .btn-sm:hover { border-color:var(--gold); color:var(--gold); }
  .btn-sm.danger:hover { border-color:#e05555; color:#e05555; }
  #login-screen { display:flex; flex-direction:column; align-items:center; justify-content:center; min-height:100vh; text-align:center; gap:24px; }
  .tab-bar { display:flex; gap:0; border-bottom:1px solid var(--border); margin-bottom:40px; }
  .tab-btn { padding:12px 28px; font-size:11px; letter-spacing:2px; text-transform:uppercase; background:none; border:none; border-bottom:2px solid transparent; color:var(--muted); cursor:pointer; transition:all .2s; margin-bottom:-1px; }
  .tab-btn.active { color:var(--gold); border-bottom-color:var(--gold); }
  .order-row { padding:20px 0; border-bottom:1px solid var(--border); }
  .order-header { display:grid; grid-template-columns:1fr auto; gap:20px; align-items:center; cursor:pointer; }
  .order-title { font-family:'Cormorant Garamond',serif; font-size:18px; color:var(--white); }
  .order-meta { font-size:11px; color:var(--muted); letter-spacing:1px; margin-top:4px; }
  .status-badge { display:inline-block; padding:4px 10px; font-size:10px; letter-spacing:1px; text-transform:uppercase; border:1px solid; }
  .status-pending { border-color:#c9a84c; color:#c9a84c; }
  .status-paid { border-color:#4caf50; color:#4caf50; }
  .order-detail { display:none; margin-top:14px; padding:20px; background:#0d0d0d; border:1px solid var(--border); font-size:12px; color:var(--muted); line-height:2.4; }
  .order-detail.open { display:block; }
  .order-detail b { color:var(--white); font-weight:400; }
</style>
</head>
<body>

<nav id="nav">
  <a href="../index.html" class="nav-logo">Hor<span>log</span>erie</a>
  <div class="nav-links">
    <span id="user-email" style="font-size:12px;color:var(--muted);"></span>
    <button id="logout-btn" class="nav-admin-btn" style="display:none;" onclick="logout()">Sign Out</button>
  </div>
</nav>

<!-- LOGIN SCREEN -->
<div id="login-screen">
  <p class="section-label">Admin Access</p>
  <h1 class="serif" style="font-size:48px;color:var(--white);font-weight:300;">HORLOGERIE</h1>
  <p style="color:var(--muted);letter-spacing:1px;font-size:13px;">Sign in with your Google account to manage watches</p>
  <button id="google-btn" onclick="googleLogin()" style="display:flex;align-items:center;gap:12px;padding:14px 32px;background:#fff;color:#333;border:none;font-family:'Jost',sans-serif;font-size:14px;letter-spacing:1px;cursor:pointer;transition:opacity .2s;">
    <svg width="20" height="20" viewBox="0 0 24 24"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>
    Continue with Google
  </button>
  <p id="login-error" style="color:#e05555;font-size:12px;display:none;"></p>
</div>

<!-- ADMIN PANEL -->
<div id="admin-panel" class="admin-wrap" style="display:none;">
  <div class="admin-header">
    <div>
      <p class="section-label">Dashboard</p>
      <h1 class="serif" style="font-size:36px;font-weight:300;color:var(--white);">HORLOGERIE Admin</h1>
    </div>
    <a href="edit.html" class="btn-gold" style="white-space:nowrap;">+ Add Watch</a>
    <a href="blog.html" class="btn-gold" style="white-space:nowrap;">Blog Manager</a>
  </div>

  <!-- Tabs -->
  <div class="tab-bar">
    <button class="tab-btn active" onclick="switchTab('watches')">Watches</button>
    <button class="tab-btn" onclick="switchTab('orders')" id="orders-tab-btn">Orders <span id="orders-count" style="font-size:10px;margin-left:4px;"></span></button>
  </div>

  <!-- Watches Tab -->
  <div id="tab-watches">
    <div id="watches-spinner" class="spinner"></div>
    <div id="watches-list"></div>
    <p id="no-watches" style="color:var(--muted);text-align:center;padding:60px;letter-spacing:2px;display:none;">NO WATCHES YET — ADD YOUR FIRST ONE</p>
  </div>

  <!-- Orders Tab -->
  <div id="tab-orders" style="display:none;">
    <div id="orders-spinner" class="spinner"></div>
    <div id="orders-list"></div>
    <p id="no-orders" style="color:var(--muted);text-align:center;padding:60px;letter-spacing:2px;display:none;">NO ORDERS YET</p>
  </div>
</div>

<div id="toast"></div>

<script type="module">
import { initializeApp }       from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getAuth, GoogleAuthProvider, signInWithPopup, signOut, onAuthStateChanged }
                               from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
import { getFirestore, collection, getDocs, deleteDoc, doc, orderBy, query, updateDoc }
                               from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey:            "AIzaSyB7SY3k0835AyM1fLDtOs0thPrg3cmxifk",
  authDomain:        "gold-bed6c.firebaseapp.com",
  projectId:         "gold-bed6c",
  storageBucket:     "gold-bed6c.firebasestorage.app",
  messagingSenderId: "498200351921",
  appId:             "1:498200351921:web:66e590427b3457a43afe90"
};
const ADMIN_EMAIL = "enzdwllg@gmail.com";

const app      = initializeApp(firebaseConfig);
const auth     = getAuth(app);
const db       = getFirestore(app);
const provider = new GoogleAuthProvider();

// ── Auth state ─────────────────────────────────────────
onAuthStateChanged(auth, user => {
  if (user && user.email === ADMIN_EMAIL) {
    document.getElementById('login-screen').style.display  = 'none';
    document.getElementById('admin-panel').style.display   = 'block';
    document.getElementById('logout-btn').style.display    = 'inline-block';
    document.getElementById('user-email').textContent      = user.email;
    loadWatches();
  } else if (user) {
    signOut(auth);
    showLoginError('Access denied. Only the site owner can log in.');
  } else {
    document.getElementById('login-screen').style.display  = 'flex';
    document.getElementById('admin-panel').style.display   = 'none';
  }
});

window.googleLogin = async () => {
  try { await signInWithPopup(auth, provider); }
  catch(e) { showLoginError(e.message); }
};
window.logout = () => signOut(auth);

function showLoginError(msg) {
  const el = document.getElementById('login-error');
  el.textContent = msg; el.style.display = 'block';
}

// ── Load watches ───────────────────────────────────────
async function loadWatches() {
  const list    = document.getElementById('watches-list');
  const spinner = document.getElementById('watches-spinner');
  try {
    const q    = query(collection(db,'watches'), orderBy('createdAt','desc'));
    const snap = await getDocs(q);
    spinner.remove();
    if (snap.empty) { document.getElementById('no-watches').style.display='block'; return; }
    snap.forEach(d => {
      const w = d.data();
      const row = document.createElement('div');
      row.className = 'watch-row';
      row.innerHTML = `
        <img class="watch-row-img" src="${w.images?.[0]||''}" alt="${w.name}" onerror="this.style.background='#1a1a1a'">
        <div>
          <div class="watch-row-name">${w.name}</div>
          <div style="font-size:11px;color:var(--muted);margin-top:4px;letter-spacing:1px;">/watches/${w.slug}.html</div>
        </div>
        <div class="watch-row-price">USD ${Number(w.price).toLocaleString()}</div>
        <div class="row-actions">
          <button class="btn-sm" onclick="location.href='edit.html?id=${d.id}'">Edit</button>
          <a href="../watches/watch-template.html?slug=${w.slug}" target="_blank" class="btn-sm" style="display:inline-flex;align-items:center;">View</a>
          <button class="btn-sm danger" onclick="deleteWatch('${d.id}', this)">Delete</button>
        </div>`;
      list.appendChild(row);
    });
  } catch(e) {
    spinner.remove();
    list.innerHTML = `<p style="color:#e05555;">Error loading watches: ${e.message}</p>`;
  }
}

window.deleteWatch = async (id, btn) => {
  if (!confirm('Delete this watch? This cannot be undone.')) return;
  btn.textContent = '...'; btn.disabled = true;
  await deleteDoc(doc(db,'watches',id));
  btn.closest('.watch-row').remove();
  showToast('Watch deleted.');
};

// ── Tab switching ──────────────────────────────────────
window.switchTab = function(tab) {
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('tab-watches').style.display = tab==='watches' ? 'block' : 'none';
  document.getElementById('tab-orders').style.display  = tab==='orders'  ? 'block' : 'none';
  event.target.classList.add('active');
  if (tab === 'orders' && !window._ordersLoaded) loadOrders();
};

// ── Load orders ────────────────────────────────────────
async function loadOrders() {
  window._ordersLoaded = true;
  const list    = document.getElementById('orders-list');
  const spinner = document.getElementById('orders-spinner');
  try {
    const q    = query(collection(db,'orders'), orderBy('createdAt','desc'));
    const snap = await getDocs(q);
    spinner.remove();
    if (snap.empty) { document.getElementById('no-orders').style.display='block'; return; }
    document.getElementById('orders-count').textContent = `(${snap.size})`;
    snap.forEach(d => {
      const o = d.data();
      const b = o.buyer || {};
      const a = b.address || {};
      const date = o.createdAt?.toDate ? o.createdAt.toDate().toLocaleString('en-US',{dateStyle:'medium',timeStyle:'short'}) : '—';
      const statusClass = o.status === 'paid' ? 'status-paid' : 'status-pending';
      const statusLabel = o.status === 'paid' ? 'Paid' : 'Pending Payment';
      const row = document.createElement('div');
      row.className = 'order-row';
      row.innerHTML = `
        <div class="order-header" onclick="this.nextElementSibling.classList.toggle('open')">
          <div>
            <div class="order-title">${o.watchName || '—'}</div>
            <div class="order-meta">${date} &nbsp;·&nbsp; ${b.name||'—'} &nbsp;·&nbsp; ${b.email||'—'}</div>
          </div>
          <div style="display:flex;align-items:center;gap:16px;">
            <div style="font-family:'Space Mono',monospace;font-size:14px;color:var(--gold);">USD ${Number(o.total||0).toLocaleString()}</div>
            <span class="status-badge ${statusClass}">${statusLabel}</span>
            ${o.status !== 'paid' ? `<button class="btn-sm" onclick="event.stopPropagation();markPaid('${d.id}',this)">Mark Paid</button>` : ''}
          </div>
        </div>
        <div class="order-detail">
          <b>Watch:</b> ${o.watchName||'—'}<br>
          <b>Price:</b> USD ${Number(o.watchPrice||0).toLocaleString()} &nbsp;+&nbsp; Shipping USD ${Number(o.watchShipping||0).toLocaleString()}<br>
          <b>Total:</b> USD ${Number(o.total||0).toLocaleString()}<br>
          <br>
          <b>Buyer:</b> ${b.name||'—'}<br>
          <b>Email:</b> ${b.email||'—'}<br>
          <b>Phone:</b> ${b.phone||'—'}<br>
          <b>Address:</b> ${[a.line1,a.line2,a.city,a.state,a.zip,a.country].filter(Boolean).join(', ')}<br>
          ${b.notes ? `<b>Notes:</b> ${b.notes}<br>` : ''}
          <br>
          <b>Order Date:</b> ${date}<br>
          <b>Status:</b> ${statusLabel}
        </div>`;
      list.appendChild(row);
    });
  } catch(e) {
    if (spinner.parentNode) spinner.remove();
    list.innerHTML = `<p style="color:#e05555;">Error loading orders: ${e.message}</p>`;
  }
}

window.markPaid = async (id, btn) => {
  btn.textContent = '...'; btn.disabled = true;
  await updateDoc(doc(db,'orders',id), { status:'paid' });
  showToast('Marked as paid.');
  window._ordersLoaded = false;
  document.getElementById('orders-list').innerHTML = '';
  const sp = document.createElement('div'); sp.id='orders-spinner'; sp.className='spinner';
  document.getElementById('tab-orders').prepend(sp);
  loadOrders();
};
</script>

<script>
function showToast(msg, type='') {
  const t = document.getElementById('toast');
  t.textContent = msg; t.className = 'show ' + type;
  setTimeout(() => t.className = '', 3000);
}
</script>
</body>
</html>
