<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin — HORLOGERIE</title>
<meta name="robots" content="noindex, nofollow">
<link rel="stylesheet" href="../css/style.css">
<style>
  body { background: #0a0a0a; }
  .admin-wrap { max-width: 1100px; margin: 0 auto; padding: 100px 5% 80px; }
  .admin-header { display:flex; align-items:center; justify-content:space-between; margin-bottom:48px; border-bottom:1px solid var(--border); padding-bottom:24px; }
  .watch-row { display:grid; grid-template-columns:80px 1fr auto auto; gap:20px; align-items:center; padding:18px 0; border-bottom:1px solid var(--border); }
  .watch-row-img { width:80px; height:60px; object-fit:cover; background:#111; }
  .watch-row-name { font-family:'Cormorant Garamond',serif; font-size:20px; color:var(--white); }
  .watch-row-price { font-family:'Space Mono',monospace; font-size:12px; color:var(--gold); }
  .row-actions { display:flex; gap:10px; }
  .btn-sm { padding:8px 16px; font-size:10px; letter-spacing:2px; text-transform:uppercase; border:1px solid var(--border); background:transparent; color:var(--muted); transition:all .2s; }
  .btn-sm:hover { border-color:var(--gold); color:var(--gold); }
  .btn-sm.danger:hover { border-color:#e05555; color:#e05555; }
  #login-screen { display:flex; flex-direction:column; align-items:center; justify-content:center; min-height:100vh; text-align:center; gap:24px; }
</style>
</head>
<body>

<nav id="nav">
  <a href="../index.html" class="nav-logo">Hor<span>log</span>erie</a>
  <div class="nav-links">
    <span id="user-email" style="font-size:12px;color:var(--muted);"></span>
    <button id="logout-btn" class="nav-admin-btn" style="display:none;" onclick="logout()">Sign Out</button>
  </div>
</nav>

<!-- LOGIN SCREEN -->
<div id="login-screen">
  <p class="section-label">Admin Access</p>
  <h1 class="serif" style="font-size:48px;color:var(--white);font-weight:300;">HORLOGERIE</h1>
  <p style="color:var(--muted);letter-spacing:1px;font-size:13px;">Sign in with your Google account to manage watches</p>
  <button id="google-btn" onclick="googleLogin()" style="display:flex;align-items:center;gap:12px;padding:14px 32px;background:#fff;color:#333;border:none;font-family:'Jost',sans-serif;font-size:14px;letter-spacing:1px;cursor:pointer;transition:opacity .2s;">
    <svg width="20" height="20" viewBox="0 0 24 24"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>
    Continue with Google
  </button>
  <p id="login-error" style="color:#e05555;font-size:12px;display:none;"></p>
</div>

<!-- ADMIN PANEL -->
<div id="admin-panel" class="admin-wrap" style="display:none;">
  <div class="admin-header">
    <div>
      <p class="section-label">Dashboard</p>
      <h1 class="serif" style="font-size:36px;font-weight:300;color:var(--white);">Watch Manager</h1>
    </div>
    <a href="edit.html" class="btn-gold" style="white-space:nowrap;">+ Add Watch</a>
  </div>

  <div id="watches-spinner" class="spinner"></div>
  <div id="watches-list"></div>
  <p id="no-watches" style="color:var(--muted);text-align:center;padding:60px;letter-spacing:2px;display:none;">NO WATCHES YET — ADD YOUR FIRST ONE</p>
</div>

<div id="toast"></div>

<script type="module">
import { initializeApp }       from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getAuth, GoogleAuthProvider, signInWithPopup, signOut, onAuthStateChanged }
                               from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
import { getFirestore, collection, getDocs, deleteDoc, doc, orderBy, query }
                               from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey:            "YOUR_API_KEY",
  authDomain:        "YOUR_PROJECT.firebaseapp.com",
  projectId:         "YOUR_PROJECT_ID",
  storageBucket:     "YOUR_PROJECT.appspot.com",
  messagingSenderId: "YOUR_SENDER_ID",
  appId:             "YOUR_APP_ID"
};
const ADMIN_EMAIL = "YOUR_GOOGLE_ACCOUNT@gmail.com";

const app      = initializeApp(firebaseConfig);
const auth     = getAuth(app);
const db       = getFirestore(app);
const provider = new GoogleAuthProvider();

// ── Auth state ─────────────────────────────────────────
onAuthStateChanged(auth, user => {
  if (user && user.email === ADMIN_EMAIL) {
    document.getElementById('login-screen').style.display  = 'none';
    document.getElementById('admin-panel').style.display   = 'block';
    document.getElementById('logout-btn').style.display    = 'inline-block';
    document.getElementById('user-email').textContent      = user.email;
    loadWatches();
  } else if (user) {
    signOut(auth);
    showLoginError('Access denied. Only the site owner can log in.');
  } else {
    document.getElementById('login-screen').style.display  = 'flex';
    document.getElementById('admin-panel').style.display   = 'none';
  }
});

window.googleLogin = async () => {
  try { await signInWithPopup(auth, provider); }
  catch(e) { showLoginError(e.message); }
};
window.logout = () => signOut(auth);

function showLoginError(msg) {
  const el = document.getElementById('login-error');
  el.textContent = msg; el.style.display = 'block';
}

// ── Load watches ───────────────────────────────────────
async function loadWatches() {
  const list    = document.getElementById('watches-list');
  const spinner = document.getElementById('watches-spinner');
  try {
    const q    = query(collection(db,'watches'), orderBy('createdAt','desc'));
    const snap = await getDocs(q);
    spinner.remove();
    if (snap.empty) { document.getElementById('no-watches').style.display='block'; return; }
    snap.forEach(d => {
      const w = d.data();
      const row = document.createElement('div');
      row.className = 'watch-row';
      row.innerHTML = `
        <img class="watch-row-img" src="${w.images?.[0]||''}" alt="${w.name}" onerror="this.style.background='#1a1a1a'">
        <div>
          <div class="watch-row-name">${w.name}</div>
          <div style="font-size:11px;color:var(--muted);margin-top:4px;letter-spacing:1px;">/watches/${w.slug}.html</div>
        </div>
        <div class="watch-row-price">USD ${Number(w.price).toLocaleString()}</div>
        <div class="row-actions">
          <button class="btn-sm" onclick="location.href='edit.html?id=${d.id}'">Edit</button>
          <a href="../watches/watch-template.html?slug=${w.slug}" target="_blank" class="btn-sm" style="display:inline-flex;align-items:center;">View</a>
          <button class="btn-sm danger" onclick="deleteWatch('${d.id}', this)">Delete</button>
        </div>`;
      list.appendChild(row);
    });
  } catch(e) {
    spinner.remove();
    list.innerHTML = `<p style="color:#e05555;">Error loading watches: ${e.message}</p>`;
  }
}

window.deleteWatch = async (id, btn) => {
  if (!confirm('Delete this watch? This cannot be undone.')) return;
  btn.textContent = '...'; btn.disabled = true;
  await deleteDoc(doc(db,'watches',id));
  btn.closest('.watch-row').remove();
  showToast('Watch deleted.');
};
</script>

<script>
function showToast(msg, type='') {
  const t = document.getElementById('toast');
  t.textContent = msg; t.className = 'show ' + type;
  setTimeout(() => t.className = '', 3000);
}
</script>
</body>
</html>
